<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Viewer + PAK Unpacker</title>
<style>
body { margin:0; font-family: 'Courier New', monospace; background:#0e1117; color:#c8d8e8; }
.fullscreen-picker {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    cursor: pointer;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
}
.picker-div {
    padding: 30px 50px;
    border: 2px solid #3ddc84;
    border-radius: 12px;
    background: #141820;
    color: #3ddc84;
    font-size: 24px;
    transition: 0.2s;
    pointer-events: none;
}
.picker-div:hover {
    background: #141820bb;
    box-shadow: 0 0 20px #3ddc8433;
}
.file-manager {
    display: none;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
}
.file-list {
    background: #141820;
    border: 1px solid #1e2d3d;
    border-radius: 4px;
    padding: 10px;
    max-height: 300px;
    overflow-y: auto;
    margin-bottom: 10px;
}
.file-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid #1e2d3d;
}
.file-item:last-child { border-bottom: none; }
.file-name { flex:1; color:#7a9ab0; }
.file-size { color:#4a6070; margin-right:10px; }
.download-btn {
    background: none;
    border: 1px solid #2a3f56;
    color: #c8d8e8;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
}
.download-btn:hover { border-color: #3ddc84; color: #3ddc84; }
button {
    font-family: inherit;
    font-size: 16px;
    padding: 12px 20px;
    border-radius: 8px;
    border: 1px solid #3ddc84;
    background: transparent;
    color: #3ddc84;
    cursor: pointer;
    margin-top: 10px;
    margin-right: 10px;
}
button:hover { background: #3ddc8422; }
.progress {
    width: 100%;
    height: 4px;
    background: #1e2d3d;
    margin: 10px 0;
    display: none;
}
.progress-bar {
    height: 100%;
    background: #3ddc84;
    width: 0%;
    transition: width 0.1s;
}
.warning { color: #ffb347; }
.error { color: #ff5555; }
</style>
</head>
<body>

<div class="fullscreen-picker" id="picker">
  <div class="picker-div">📂 Select files</div>
  <input type="file" id="fileInput" multiple style="display:none;">
</div>

<div class="file-manager" id="fileManager">
  <div class="file-list" id="fileList"></div>
  <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
  <button id="downloadAllBtn">⬇ Download All as ZIP</button>
  <button id="backBtn">↺ New Selection</button>
</div>

<script>
// ==================== UNPACKER LIBRARY (PAK+P) ====================
(function(global) {
    "use strict";

    const MAGIC = new Uint8Array([0x50, 0x50, 0x41, 0x4B, 0x01]); // PPAK\x01
    const VERSION = 0x01;
    const TYPE_CHUNK_FULL = 0x01;
    const TYPE_CHUNK_SLIM = 0x02;
    const TYPE_PAK = 0xDA;

    const CRC32_TABLE = (() => {
        const table = new Uint32Array(256);
        for (let i = 0; i < 256; i++) {
            let c = i;
            for (let k = 0; k < 8; k++) {
                c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
            }
            table[i] = c >>> 0;
        }
        return table;
    })();

    function crc32(data) {
        let c = 0xFFFFFFFF;
        for (let i = 0; i < data.length; i++) {
            c = CRC32_TABLE[(c ^ data[i]) & 0xFF] ^ (c >>> 8);
        }
        return (c ^ 0xFFFFFFFF) >>> 0;
    }

    function readU16(data, offset) {
        return data[offset] | (data[offset + 1] << 8);
    }
    function readU32(data, offset) {
        return (data[offset] | (data[offset + 1] << 8) | (data[offset + 2] << 16) | (data[offset + 3] << 24)) >>> 0;
    }
    function readU64(data, offset) {
        const low = readU32(data, offset);
        const high = readU32(data, offset + 4);
        return BigInt(low) + (BigInt(high) << 32n);
    }
    function writeU16(arr, off, v) {
        arr[off] = v & 255;
        arr[off + 1] = (v >> 8) & 255;
    }
    function writeU32(arr, off, v) {
        arr[off] = v & 255;
        arr[off + 1] = (v >> 8) & 255;
        arr[off + 2] = (v >> 16) & 255;
        arr[off + 3] = (v >> 24) & 255;
    }

    async function inflate(data) {
        if (typeof DecompressionStream === 'undefined') {
            throw new Error('DecompressionStream not supported');
        }
        const ds = new DecompressionStream('deflate');
        const writer = ds.writable.getWriter();
        writer.write(data);
        writer.close();
        const reader = ds.readable.getReader();
        const chunks = [];
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
        }
        const total = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
        const result = new Uint8Array(total);
        let offset = 0;
        for (const chunk of chunks) {
            result.set(chunk, offset);
            offset += chunk.length;
        }
        return result;
    }

    async function parsePak(data) {
        if (data.length < 8) throw new Error('File too short');
        let magicOk = true;
        for (let i = 0; i < MAGIC.length; i++) {
            if (data[i] !== MAGIC[i]) { magicOk = false; break; }
        }
        if (!magicOk) throw new Error('Invalid magic: not a PPAK file');

        const type = data[7];
        if (type !== TYPE_PAK) throw new Error('Not a .pak file');

        let p = 8;
        const nameLen = readU16(data, p); p += 2;
        const archiveName = new TextDecoder().decode(data.subarray(p, p + nameLen)); p += nameLen;
        const totalRawSize = readU64(data, p); p += 8;
        const totalChunks = readU32(data, p); p += 4;
        const chunkCompressed = data[p++] !== 0;
        const pakCompressed = data[p++] !== 0;
        const manifestFmt = data[p++];

        const blockLen = data.length - p - 4;
        const block = data.subarray(p, p + blockLen);
        p += blockLen;
        const storedCrc = readU32(data, p);
        const computedCrc = crc32(data.subarray(0, p));
        if (computedCrc !== storedCrc) console.warn('PAK CRC mismatch');

        let rawBlock = block;
        if (pakCompressed) rawBlock = await inflate(block);

        let rp = 0;
        const fileCount = readU32(rawBlock, rp); rp += 4;
        const entries = [];
        for (let i = 0; i < fileCount; i++) {
            const pathLen = readU16(rawBlock, rp); rp += 2;
            const path = new TextDecoder().decode(rawBlock.subarray(rp, rp + pathLen)); rp += pathLen;
            const size = Number(readU64(rawBlock, rp)); rp += 8;
            entries.push({ path, size });
        }
        const rawSizes = [];
        for (let i = 0; i < totalChunks; i++) {
            rawSizes.push(readU32(rawBlock, rp)); rp += 4;
        }

        return {
            archiveName,
            totalRawSize: Number(totalRawSize),
            totalChunks,
            chunkCompressed,
            pakCompressed,
            manifest: { version: 1, entries },
            rawSizes,
            magicOk
        };
    }

    function parseP(data, tolerateBadMagic = false) {
        if (data.length < 8) throw new Error('Chunk too short');
        let magicOk = true;
        for (let i = 0; i < MAGIC.length; i++) {
            if (data[i] !== MAGIC[i]) { magicOk = false; break; }
        }
        if (!magicOk && !tolerateBadMagic) throw new Error('Invalid magic in chunk');

        const type = data[7];
        let p = 8;
        const chunkIdx = readU32(data, p); p += 4;
        const totalChunks = readU32(data, p); p += 4;
        const totalRawSize = readU64(data, p); p += 8;

        let manifest = null;
        let compressed = false;
        let payloadCrc = 0;
        let payloadLen = 0;
        let payloadStart = 0;

        if (type === TYPE_CHUNK_FULL) {
            const manifestLen = readU32(data, p); p += 4;
            if (manifestLen > 0) {
                const manifestFmt = data[p++];
                if (manifestFmt === 0x01) {
                    const rawManifest = data.subarray(p, p + manifestLen - 1);
                    let mp = 0;
                    const fileCount = readU32(rawManifest, mp); mp += 4;
                    const entries = [];
                    for (let i = 0; i < fileCount; i++) {
                        const pathLen = readU16(rawManifest, mp); mp += 2;
                        const path = new TextDecoder().decode(rawManifest.subarray(mp, mp + pathLen)); mp += pathLen;
                        const size = Number(readU64(rawManifest, mp)); mp += 8;
                        entries.push({ path, size });
                    }
                    manifest = { version: 1, entries };
                } else {
                    try {
                        const jsonStr = new TextDecoder().decode(data.subarray(p, p + manifestLen - 1));
                        manifest = JSON.parse(jsonStr);
                    } catch (e) {}
                }
                p += (manifestLen - 1);
            }
            compressed = data[p++] !== 0;
            payloadCrc = readU32(data, p); p += 4;
            payloadLen = readU32(data, p); p += 4;
            payloadStart = p;
        } else if (type === TYPE_CHUNK_SLIM) {
            compressed = data[p++] !== 0;
            payloadCrc = readU32(data, p); p += 4;
            payloadLen = readU32(data, p); p += 4;
            payloadStart = p;
        } else {
            throw new Error('Unknown chunk type');
        }

        return {
            type,
            chunkIdx,
            totalChunks,
            totalRawSize: Number(totalRawSize),
            manifest,
            compressed,
            payloadCrc,
            payloadLen,
            payloadStart,
            magicOk
        };
    }

    async function extractPayload(data, header) {
        if (header.payloadStart === 0) return data.slice();
        const raw = data.subarray(header.payloadStart, header.payloadStart + header.payloadLen);
        const computed = crc32(raw);
        if (computed !== header.payloadCrc) console.warn(`CRC mismatch in chunk ${header.chunkIdx}`);
        if (!header.compressed) return raw;
        return await inflate(raw);
    }

    function createZip(files) {
        const encoder = new TextEncoder();
        const locals = [];
        let offset = 0;
        for (const f of files) {
            const nameBytes = encoder.encode(f.name);
            const crc = crc32(f.data);
            const size = f.data.length;
            const lh = new Uint8Array(30 + nameBytes.length);
            writeU32(lh, 0, 0x04034B50);
            writeU16(lh, 4, 20);
            writeU16(lh, 6, 0);
            writeU16(lh, 8, 0);
            writeU16(lh, 10, 0);
            writeU16(lh, 12, 0);
            writeU32(lh, 14, crc);
            writeU32(lh, 18, size);
            writeU32(lh, 22, size);
            writeU16(lh, 26, nameBytes.length);
            writeU16(lh, 28, 0);
            lh.set(nameBytes, 30);
            locals.push({ lh, data: f.data, nameBytes, crc, offset });
            offset += lh.length + size;
        }

        const cds = [];
        let cdSize = 0;
        for (const f of locals) {
            const cd = new Uint8Array(46 + f.nameBytes.length);
            writeU32(cd, 0, 0x02014B50);
            writeU16(cd, 4, 20);
            writeU16(cd, 6, 20);
            writeU16(cd, 8, 0);
            writeU16(cd, 10, 0);
            writeU16(cd, 12, 0);
            writeU16(cd, 14, 0);
            writeU32(cd, 16, f.crc);
            writeU32(cd, 20, f.data.length);
            writeU32(cd, 24, f.data.length);
            writeU16(cd, 28, f.nameBytes.length);
            writeU16(cd, 30, 0);
            writeU16(cd, 32, 0);
            writeU16(cd, 34, 0);
            writeU16(cd, 36, 0);
            writeU32(cd, 38, 0);
            writeU32(cd, 42, f.offset);
            cd.set(f.nameBytes, 46);
            cds.push(cd);
            cdSize += cd.length;
        }

        const eocd = new Uint8Array(22);
        writeU32(eocd, 0, 0x06054B50);
        writeU16(eocd, 4, 0);
        writeU16(eocd, 6, 0);
        writeU16(eocd, 8, locals.length);
        writeU16(eocd, 10, locals.length);
        writeU32(eocd, 12, cdSize);
        writeU32(eocd, 16, offset);
        writeU16(eocd, 20, 0);

        const total = offset + cdSize + eocd.length;
        const zip = new Uint8Array(total);
        let pos = 0;
        for (const f of locals) {
            zip.set(f.lh, pos); pos += f.lh.length;
            zip.set(f.data, pos); pos += f.data.length;
        }
        for (const cd of cds) { zip.set(cd, pos); pos += cd.length; }
        zip.set(eocd, pos);
        return zip;
    }

    async function unpack(files) {
        const pakFile = files.find(f => f.name.toLowerCase().endsWith('.pak'));
        const pFiles = files.filter(f => f.name.toLowerCase().endsWith('.p'));

        if (pFiles.length === 0) {
            return { success: false, reason: 'no_p_files', files: [] };
        }

        const parsedChunks = [];
        for (const f of pFiles) {
            try {
                const header = parseP(f.data, true);
                parsedChunks.push({ ...header, data: f.data, originalName: f.name });
            } catch (e) {
                parsedChunks.push({
                    type: null, chunkIdx: -1, totalChunks: -1, manifest: null,
                    compressed: false, payloadCrc: 0, payloadLen: f.data.length,
                    payloadStart: 0, data: f.data, originalName: f.name, magicOk: false
                });
            }
        }

        parsedChunks.sort((a, b) => {
            if (a.chunkIdx === -1) return 1;
            if (b.chunkIdx === -1) return -1;
            return a.chunkIdx - b.chunkIdx;
        });

        let manifest = null;
        let totalChunks = -1;
        let chunkCompressed = false;

        if (pakFile) {
            try {
                const pakInfo = await parsePak(pakFile.data);
                manifest = pakInfo.manifest;
                totalChunks = pakInfo.totalChunks;
                chunkCompressed = pakInfo.chunkCompressed;
            } catch (e) { console.warn('pak parse failed', e); }
        }

        if (!manifest) {
            const chunk0 = parsedChunks.find(c => c.chunkIdx === 0);
            if (chunk0 && chunk0.manifest) {
                manifest = chunk0.manifest;
                totalChunks = chunk0.totalChunks;
                chunkCompressed = chunk0.compressed;
            }
        }

        if (!manifest) {
            return {
                success: false,
                reason: 'no_manifest',
                files: parsedChunks.map(c => ({
                    name: c.originalName || `chunk_${c.chunkIdx}.bin`,
                    data: c.data
                }))
            };
        }

        const presentIndices = parsedChunks.map(c => c.chunkIdx).filter(i => i !== -1);
        const missing = [];
        for (let i = 0; i < totalChunks; i++) {
            if (!presentIndices.includes(i)) missing.push(i);
        }

        if (missing.length > 0) {
            return {
                success: false,
                reason: 'missing_chunks',
                missing,
                files: parsedChunks.map(c => ({
                    name: c.originalName || `chunk_${c.chunkIdx}.bin`,
                    data: c.data
                }))
            };
        }

        const payloads = [];
        for (const chunk of parsedChunks) {
            const pl = await extractPayload(chunk.data, chunk);
            payloads.push(pl);
        }

        const totalLen = payloads.reduce((s, p) => s + p.length, 0);
        const blob = new Uint8Array(totalLen);
        let offset = 0;
        for (const p of payloads) { blob.set(p, offset); offset += p.length; }

        const reconstructed = [];
        let blobOff = 0;
        for (const entry of manifest.entries) {
            const data = blob.subarray(blobOff, blobOff + entry.size).slice();
            blobOff += entry.size;
            reconstructed.push({ path: entry.path, data });
        }

        return { success: true, files: reconstructed };
    }

    global.Unpacker = { parsePak, parseP, extractPayload, unpack, createZip, crc32 };
})(window);
// ==================== END OF UNPACKER ====================

// ==================== APPLICATION CODE ====================
const fileInput = document.getElementById('fileInput');
const picker = document.getElementById('picker');
const fileManager = document.getElementById('fileManager');
const fileListDiv = document.getElementById('fileList');
const downloadAllBtn = document.getElementById('downloadAllBtn');
const backBtn = document.getElementById('backBtn');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');

let selectedFiles = [];
let currentDisplayFiles = [];
let isUnpackedMode = false;

picker.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    selectedFiles = [];
    for (const file of files) {
        const data = new Uint8Array(await file.arrayBuffer());
        selectedFiles.push({ name: file.name, data });
    }
    picker.style.display = 'none';
    fileManager.style.display = 'block';
    await processSelectedFiles();
});

async function processSelectedFiles() {
    const hasPak = selectedFiles.some(f => f.name.toLowerCase().endsWith('.pak'));
    const hasP = selectedFiles.some(f => f.name.toLowerCase().endsWith('.p'));

    if (hasPak || hasP) {
        progress.style.display = 'block';
        progressBar.style.width = '30%';
        try {
            const result = await Unpacker.unpack(selectedFiles);
            progressBar.style.width = '100%';
            setTimeout(() => progress.style.display = 'none', 500);

            if (result.success) {
                currentDisplayFiles = result.files.map(f => ({
                    name: f.path,
                    data: f.data,
                    size: f.data.length
                }));
                isUnpackedMode = true;
                renderFileList(true);
            } else {
                if (result.reason === 'no_manifest') {
                    currentDisplayFiles = result.files;
                    isUnpackedMode = true;
                    renderFileList(true, '⚠️ Манифест не найден, показаны сырые чанки');
                } else if (result.reason === 'missing_chunks') {
                    currentDisplayFiles = result.files;
                    isUnpackedMode = true;
                    renderFileList(true, `❌ Отсутствуют чанки: ${result.missing.join(', ')}`);
                } else {
                    currentDisplayFiles = selectedFiles.map(f => ({ name: f.name, data: f.data, size: f.data.length }));
                    isUnpackedMode = false;
                    renderFileList(false);
                }
            }
        } catch (err) {
            progress.style.display = 'none';
            currentDisplayFiles = selectedFiles.map(f => ({ name: f.name, data: f.data, size: f.data.length }));
            isUnpackedMode = false;
            renderFileList(false, `Ошибка распаковки: ${err.message}`);
            console.error(err);
        }
    } else {
        currentDisplayFiles = selectedFiles.map(f => ({ name: f.name, data: f.data, size: f.data.length }));
        isUnpackedMode = false;
        renderFileList(false);
    }
}

function renderFileList(isUnpacked, warningMsg = '') {
    // Очищаем контейнер
    fileListDiv.innerHTML = '';
    
    if (warningMsg) {
        const warnDiv = document.createElement('div');
        warnDiv.className = 'warning';
        warnDiv.textContent = warningMsg;
        fileListDiv.appendChild(warnDiv);
    }
    
    if (currentDisplayFiles.length === 0) {
        const emptyDiv = document.createElement('div');
        emptyDiv.textContent = 'No files';
        fileListDiv.appendChild(emptyDiv);
        return;
    }

    currentDisplayFiles.forEach((f, idx) => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'file-item';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'file-name';
        // Приводим имя к строке безопасно
        let displayName = f.name;
        if (typeof displayName !== 'string') {
            try {
                displayName = String(displayName);
            } catch (e) {
                displayName = 'unnamed';
            }
        }
        nameSpan.textContent = displayName;

        const sizeSpan = document.createElement('span');
        sizeSpan.className = 'file-size';
        const size = f.size || (f.data ? f.data.length : 0);
        sizeSpan.textContent = formatSize(size);

        const btn = document.createElement('button');
        btn.className = 'download-btn';
        btn.textContent = '⬇';
        btn.onclick = () => downloadSingle(idx);

        itemDiv.appendChild(nameSpan);
        itemDiv.appendChild(sizeSpan);
        itemDiv.appendChild(btn);
        fileListDiv.appendChild(itemDiv);
    });
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(2) + ' MB';
}

window.downloadSingle = function(index) {
    const file = currentDisplayFiles[index];
    if (!file) return;
    
    // Преобразуем данные в Uint8Array, если необходимо
    let data = file.data;
    if (!(data instanceof Uint8Array)) {
        if (data instanceof ArrayBuffer) {
            data = new Uint8Array(data);
        } else {
            try {
                data = new Uint8Array(data);
            } catch (e) {
                console.error('Invalid data for download', e);
                return;
            }
        }
    }
    
    const blob = new Blob([data]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = file.name.split('/').pop() || 'file.bin';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
};

downloadAllBtn.onclick = () => {
    if (currentDisplayFiles.length === 0) return;
    
    // Подготавливаем файлы для ZIP: убеждаемся, что data - Uint8Array
    const filesForZip = currentDisplayFiles.map(f => {
        let data = f.data;
        if (!(data instanceof Uint8Array)) {
            if (data instanceof ArrayBuffer) {
                data = new Uint8Array(data);
            } else {
                data = new Uint8Array(data);
            }
        }
        return { name: f.name, data };
    });
    
    const zip = Unpacker.createZip(filesForZip);
    const blob = new Blob([zip]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = isUnpackedMode ? 'reconstructed.zip' : 'files.zip';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
};

backBtn.onclick = () => {
    fileManager.style.display = 'none';
    picker.style.display = 'flex';
    selectedFiles = [];
    currentDisplayFiles = [];
    fileInput.value = '';
    progress.style.display = 'none';
};
</script>
</body>
</html>
